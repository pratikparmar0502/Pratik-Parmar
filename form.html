<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- mathod can be get or post -->
    <form method="">
      <label for="name">name :</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="enter your name"
        readonly
      /><br /><br />
      <label for="surname">surname :</label>
      <input
        type="text"
        id="surname"
        name="surname"
        placeholder="enter your surname"
      /><br /><br />
      <label for="password">password:</label>
      <input
        type="text"
        id="password"
        name="password"
        placeholder="enter your password"
        minlength="1"
        maxlength="8"
      /><br /><br />

      <input type="color" name="" id="" /> <br /><br />
      <input type="date" name="" id="" /><br /><br />
      <input type="time" name="" id="" /><br /><br />
      <input type="datetime-local" name="" id="" /><br /><br />
      <input type="month" name="" id="" /><br /><br />
      <input type="week" name="" id="" /><br /><br />
      <input type="number" name="" id="" min="0" max="10" /><br /><br />
      <input type="range" name="" id="" /><br /><br />
      <input type="email" name="" id="" /><br /><br />
      <input type="url" name="" id="" /><br /><br />
      <input type="file" name="" id="" /><br /><br />
      <select name="" id="">
        <option value="">--select city--</option>
        <option value="">surat</option>
        <option value="">ahmadavad</option>
        <option value="">valsad</option>
        <option value="">rajkot</option>
        <option value="">vapi</option>
        <option value="">navsari</option>
        <option value="">Mumbai</option></select
      ><br /><br />
      <textarea
        name=""
        id=""
        rows="10"
        cols="50"
        placeholder="enter your address"
      ></textarea
      ><br /><br />

      <label for="select game">select game :</label>
      basketball<input type="checkbox" name="s" id="" /> running<input
        type="checkbox"
        name="s"
        id=""
      />
      cricket<input type="checkbox" name="s" id="" /><br /><br />

      <label for="male">male</label>
      <input type="radio" name="a" id="male" />
      <label for="female">female</label>
      <input type="radio" name="a" id="female" />
      <label for="others">others</label>
      <input type="radio" name="a" id="others" checked /><br /><br />
      <input type="button" value="submit" />
      <input type="button" value="Reset" />
    </form>
  </body>
</html>

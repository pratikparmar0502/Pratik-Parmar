    <table border="1" id="albumTable" style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>ID</th>
                <th>Title (Album Name)</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script>

        function deleteAlbum(id) {
            let row = document.querySelector(`#row-${id}`);
            let isConfirm = confirm("Are you sure you want to delete this album?");

            if (isConfirm && row) {
                row.remove();
            }
        }

        async function getData() {
            try {
                let res = await fetch("https://jsonplaceholder.typicode.com/albums");
                let data = await res.json();
                console.log(data);

                let tableBody = document.querySelector("#tableBody");

                let rowsHtml = data.map((item, index) => {
                    return `
                        <tr>
                            <td>${item.id}</td>
                            <td>${item.title}</td>
                            <td><button onclick="deleteAlbum(${item.id})">Delete</button></td>
                        </tr>
                    `;
                }).join("");

                tableBody.innerHTML = rowsHtml;


            } catch (error) {
                console.log("error: ", error);
            }
        }

        getData()


    </script>

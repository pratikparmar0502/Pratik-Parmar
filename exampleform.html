<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Details Form</title>
  </head>
  <body>
    <form action="">
      <h1>Student Detail Form</h1>
      <br /><br />

      <label for=" Roll No. :"> Roll No. :</label>
      <input
        type="text"
        name="roll no"
        id="roll no"
        placeholder="Roll no."
        required
      /><br /><br />
      <label for="name"> Name :</label>
      <input
        type="text"
        name="name"
        id="name"
        placeholder="Enter your name"
        required
      /><br /><br />
      <label for="address">Address :</label>
      <textarea
        name="address"
        id="address"
        placeholder="Enter your address"
        rows="8"
      ></textarea
      ><br /><br />
      <label for="date of birth">Date of Birth :</label>
      <input type="date" name="" id="" required /><br /><br />
      <label for="gender">Gender :</label>
      <input type="radio" name="g" id="" required />Male
      <input type="radio" name="g" id="" required />Female <br /><br />
      <label for="hobby">Hobby :</label>
      <input type="checkbox" name="hobby" id="" />Cricket
      <input type="checkbox" name="hobby" id="" />Reading
      <input type="checkbox" name="Hobby" id="" />Travelling
      <input type="checkbox" name="hobby" id="" />Dancing
      <input type="checkbox" name="hobby" id="" />Singing <br /><br />
      <label for="username"> Username :</label>
      <input
        type="text"
        name="username"
        id="username"
        placeholder="Enter your Username"
        required
      /><br /><br />
      <label for="password">Password</label>
      <input
        type="password"
        name="password"
        id="password  "
        placeholder="Enter your password"
        minlength="1"
        maxlength="8"
        required
      />
      <br /><br />
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
